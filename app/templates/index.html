{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        
        <!-- 新增任務的表單區塊 -->
        <div class="card premium-card mb-4 slide-in">
            <div class="card-body p-4">
                <h5 class="card-title fw-bold mb-3 text-white">✚ 新增任務</h5>
                <form action="{{ url_for('task_bp.add_task') }}" method="POST" class="d-flex flex-column flex-md-row gap-3 align-items-md-center mt-3">
                    <input type="text" name="title" class="form-control premium-input flex-grow-1" placeholder="接下來要完成什麼事情？" required>
                    <input type="datetime-local" name="target_time" class="form-control premium-input" style="max-width: 200px;">
                    <button type="submit" class="btn premium-btn px-4 py-2">Add</button>
                </form>
            </div>
        </div>

        <!-- 任務上方的過濾器區塊 -->
        <div class="d-flex justify-content-between align-items-center mb-3 fade-in mt-5">
            <h5 class="fw-bold m-0 text-white">任務清單</h5>
            <div class="filter-group">
                <a href="{{ url_for('task_bp.index') }}" class="btn btn-outline-light btn-sm {{ 'active' if not current_filter }}">所有任務</a>
                <a href="{{ url_for('task_bp.index', filter='todo') }}" class="btn btn-outline-light btn-sm {{ 'active' if current_filter == 'todo' }}">進行中</a>
                <a href="{{ url_for('task_bp.index', filter='done') }}" class="btn btn-outline-light btn-sm {{ 'active' if current_filter == 'done' }}">已完成</a>
            </div>
        </div>

        <!-- 任務條列區塊 (使用 Jinja2 用 FOR 迴圈跑出每一筆) -->
        <div class="task-list">
            {% if tasks %}
                {% for task in tasks %}
                <div class="card task-item mb-3 slide-up" style="animation-delay: {{ loop.index0 * 0.08 }}s;">
                    <div class="card-body d-flex justify-content-between align-items-center p-3">
                        <div class="d-flex align-items-center gap-3">
                            <!-- ✅ 切換狀態 (toggle) 按鈕 -->
                            <form action="{{ url_for('task_bp.toggle_task', task_id=task.id) }}" method="POST" class="m-0">
                                <button type="submit" class="btn btn-icon toggle-btn {{ 'completed' if task.status == 'done' }}" aria-label="Mark task">
                                    {% if task.status == 'done' %}
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="done-check" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                                    {% else %}
                                    <div class="empty-circle"></div>
                                    {% endif %}
                                </button>
                            </form>
                            <div>
                                <h6 class="m-0 fw-semibold {{ 'text-decoration-line-through text-muted' if task.status == 'done' else 'text-light' }}">{{ task.title }}</h6>
                                {% if task.target_time %}
                                <small class="text-muted timer-text">
                                    <svg width="12" height="12" class="me-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                    {{ task.target_time.replace('T', ' ') }}
                                </small>
                                {% endif %}
                            </div>
                        </div>
                        
                        <!-- ❌ 刪除按鈕 -->
                        <form action="{{ url_for('task_bp.delete_task', task_id=task.id) }}" method="POST" class="m-0" onsubmit="return confirm('確定要丟棄這個任務嗎？');">
                            <button type="submit" class="btn btn-icon delete-btn text-danger">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </form>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="text-center p-5 text-muted fade-in mt-4 border border-secondary rounded empty-state">
                    <svg width="56" height="56" class="mb-3 opacity-50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    <h4>這裡還沒有紀錄任何任務</h4>
                    <p class="mb-0 text-secondary">現在正是排解待辦事項的好時機！趕快新增一個吧。</p>
                </div>
            {% endif %}
        </div>

    </div>
</div>
{% endblock %}
